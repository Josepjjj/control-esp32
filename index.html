<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Control ESP32</title>
</head>
<body>

<h2>Control ESP32</h2>

<button onclick="a1('ON')">A1 ON</button>
<button onclick="a1('OFF')">A1 OFF</button>

<br><br>

<button onclick="a2('ON')">A2 ON</button>
<button onclick="a2('OFF')">A2 OFF</button>

<br><br>

<p>Valor ESP32:</p>
<div id="valor" style="width:100px;height:40px;border:1px solid black;font-size:20px;display:flex;align-items:center;justify-content:center;">
  ---
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbwzyoAMlIESmw1LW4IViSf5pNNXdJ2LrNNwiVy2QQ4HXhmy-7paNsh5sq922ZU3iNY/exec";

function a1(valor) {
  fetch(`${url}?celda=A1&valor=${valor}`, { mode: 'no-cors' });
}

function a2(valor) {
  fetch(`${url}?celda=A2&valor=${valor}`, { mode: 'no-cors' });
}

function actualizarValor() {
  fetch(url)
    .then(res => res.json())
    .then(data => {
      document.getElementById("valor").innerText = data.A3 || "---";
    });
}

setInterval(actualizarValor, 2000);
actualizarValor();
</script>

</body>
</html>
